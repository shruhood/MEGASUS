adb:
  path: core/platform-tools
  auto_start_server: true
auth:
  enabled: true
  admin_password: megasus2026
  operator_password: operator2026
  session_timeout_minutes: 30
logging:
  enabled: true
  log_dir: logs
  log_commands: true
  log_output: false
display:
  theme: dark
  banner: true
  colors: true
connection:
  default_timeout: 10
  wireless_port: 5555
  auto_reconnect: true
dashboard:
  enabled: false
  host: 0.0.0.0
  port: 8080
  secret_key: megasus-secret-change-this

# ── LLM Provider Config ─────────────────────────────────────
# API keys can also be set via environment variables.
# Priority: llm_config.json (plugin) > config.yaml > env vars
llm:
  # Default provider: openrouter, openai, gemini, claude, hermes, openclaw, claude-code
  provider: ""
  api_key: ""
  model: ""

  # Individual provider keys (alternative to single provider above)
  openrouter_api_key: ""
  openai_api_key: ""
  gemini_api_key: ""
  claude_api_key: ""

  # Local gateway settings
  hermes_url: "http://localhost:11434/v1/chat/completions"
  hermes_model: "hermes-4-technical"
  openclaw_url: "http://localhost:3000/v1/chat/completions"
  openclaw_model: "openclaw-default"
